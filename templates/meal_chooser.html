<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NTFY meal chooser</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: #171a21;
      --panel-alt: #1d2230;
      --text: #edf2ff;
      --muted: #aeb8d6;
      --accent: #7aa2ff;
      --accent-2: #8ef0c6;
      --border: #2b3244;
      --shadow: rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #0d1016 0%, #111522 100%);
      color: var(--text);
    }

    body.is-loading {
      cursor: progress;
    }

    .page {
      max-width: 1380px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      margin-bottom: 24px;
    }

    .hero-card {
      background: rgba(23, 26, 33, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 18px 50px var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero-card.sticky-main-bar {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%);
      width: min(1380px, calc(100% - 48px));
      z-index: 40;
      background: rgba(23, 26, 33, 0.96);
    }

    h1, h2, p {
      margin: 0;
    }

    .meal-header p,
    .footer-note {
      color: var(--muted);
    }

    .toolbar {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    .toolbar-main,
    .toolbar-left,
    .toolbar-state,
    .toolbar-actions,
    .date-form,
    .date-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .toolbar-main {
      justify-content: space-between;
      gap: 14px;
    }

    .toolbar-left {
      flex: 1 1 560px;
      min-width: 0;
    }

    .toolbar-state {
      justify-content: flex-end;
      gap: 8px;
    }

    .toolbar-secondary {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: end;
      justify-content: space-between;
      margin-top: 14px;
    }

    .toolbar-secondary.is-collapsed {
      display: none;
    }

    .nav-button,
    .jump-button {
      text-decoration: none;
      color: var(--text);
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 600;
    }

    .button-icon {
      display: none;
      line-height: 1;
      font-size: 1rem;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .nav-button:hover,
    .jump-button:hover {
      border-color: rgba(122, 162, 255, 0.6);
    }

    .nav-arrow {
      min-width: 44px;
      text-align: center;
      padding: 10px 0;
      font-size: 1.1rem;
      line-height: 1;
    }

    .date-input {
      background: #111623;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
    }

    .toolbar-label {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .save-status {
      color: var(--muted);
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(29, 34, 48, 0.8);
      border: 1px solid var(--border);
    }

    .save-status.is-saved {
      color: #c4f5dd;
      border-color: rgba(142, 240, 198, 0.35);
    }

    .save-status.is-dirty {
      color: #ffe29a;
      border-color: rgba(255, 226, 154, 0.35);
    }

    .save-status.is-saving {
      color: #bfd1ff;
      border-color: rgba(122, 162, 255, 0.35);
    }

    .top-links {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .target-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .target-field {
      display: grid;
      gap: 6px;
    }

    .target-field label {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .target-input {
      width: 110px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .metric {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 1.45rem;
      font-weight: 700;
    }

    .metric-subtle {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 6px;
    }

    .meals {
      display: grid;
      gap: 22px;
    }

    .meal-section {
      background: rgba(23, 26, 33, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 50px var(--shadow);
    }

    .meal-header {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .options.single-option {
      grid-template-columns: minmax(240px, 420px);
    }

    .option-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: #111623;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      touch-action: manipulation;
    }

    .option-card:hover {
      transform: translateY(-1px);
      border-color: rgba(122, 162, 255, 0.6);
    }

    .option-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(122, 162, 255, 0.45);
    }

    .option-card.user-selected {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 1px rgba(142, 240, 198, 0.35);
    }

    .option-card[hidden] {
      display: none !important;
    }

    .option-image,
    .option-placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: linear-gradient(135deg, #232939, #141922);
    }

    .option-image {
      object-fit: cover;
      display: block;
    }

    .option-placeholder {
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .option-body {
      padding: 14px;
      display: grid;
      gap: 10px;
      height: 100%;
    }

    .option-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .option-name {
      font-size: 1rem;
      line-height: 1.35;
      font-weight: 600;
    }

    .macro-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--panel-alt);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.88rem;
    }

    .selection-status {
      color: var(--accent-2);
      font-size: 0.9rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(29, 34, 48, 0.72);
      white-space: nowrap;
    }

    .selection-status.recommended {
      color: #bfd1ff;
      border-color: rgba(122, 162, 255, 0.35);
    }

    .selection-status.user {
      color: var(--accent-2);
      border-color: rgba(142, 240, 198, 0.35);
    }

    .selection-status.saved {
      color: var(--accent-2);
      border-color: rgba(142, 240, 198, 0.35);
    }

    .selection-status.pick {
      color: var(--muted);
    }

    .option-note {
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.35;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .small-button {
      color: var(--text);
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    .small-button,
    .nav-button,
    .jump-button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .mobile-controls-toggle {
      display: none;
    }

    .small-button:hover {
      border-color: rgba(122, 162, 255, 0.6);
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.94rem;
      line-height: 1.5;
    }

    .error-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 140, 140, 0.35);
      background: rgba(255, 140, 140, 0.1);
      color: #ffd0d0;
      line-height: 1.45;
    }

    .loading-overlay[hidden] {
      display: none;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(13, 16, 22, 0.72);
      backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 140ms ease;
    }

    .loading-overlay.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: all;
    }

    .loading-panel {
      width: min(420px, calc(100vw - 32px));
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(23, 26, 33, 0.96);
      box-shadow: 0 18px 50px var(--shadow);
    }

    .loading-title {
      margin-bottom: 10px;
      font-weight: 700;
    }

    .loading-text {
      margin-bottom: 12px;
      color: var(--muted);
    }

    .loading-progress {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
    }

    .loading-progress-bar {
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #4d77ff, var(--accent), var(--accent-2));
      animation: loading-slide 1.15s ease-in-out infinite;
    }

    @keyframes loading-slide {
      from {
        transform: translateX(-120%);
      }

      to {
        transform: translateX(320%);
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 10px;
      }

      .hero {
        margin-bottom: 12px;
      }

      #heroSpacer {
        display: none;
      }

      .hero-card.sticky-main-bar {
        position: static;
        top: auto;
        left: auto;
        transform: none;
        width: 100%;
        padding: 8px;
        border-radius: 14px;
      }

      .toolbar {
        gap: 6px;
        margin-top: 0;
      }

      .toolbar-main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
      }

      .toolbar-left {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        min-width: 0;
      }

      .toolbar-secondary {
        width: 100%;
      }

      .toolbar-state {
        display: grid;
        grid-template-columns: auto auto;
        align-items: center;
        justify-content: end;
        gap: 8px;
      }

      .toolbar-label {
        display: none;
      }

      .top-links .jump-button,
      .mobile-controls-toggle,
      .save-status {
        min-height: 34px;
        padding: 6px;
        font-size: 0.8rem;
      }

      #planCountLabel {
        display: none;
      }

      .button-icon {
        display: inline-flex;
      }

      .button-text {
        display: none;
      }

      .top-links .jump-button,
      .mobile-controls-toggle,
      .toolbar-actions .small-button,
      #goDateButton {
        min-width: 34px;
        width: 34px;
        padding-left: 0;
        padding-right: 0;
      }

      .save-status {
        width: 12px;
        min-width: 12px;
        min-height: 12px;
        height: 12px;
        padding: 0;
        border-radius: 999px;
        font-size: 0;
      }

      #saveStatus {
        justify-self: center;
      }

      .top-links {
        gap: 0;
      }

      .date-form {
        display: block;
        width: 100%;
      }

      #goDateButton {
        display: none;
      }

      .date-nav {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) 44px;
        width: 100%;
      }

      .date-input {
        width: 100%;
        min-width: 0;
        min-height: 40px;
        padding: 8px 10px;
        text-align: center;
      }

      .target-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
      }

      .target-field,
      .target-input {
        width: 100%;
        min-width: 0;
      }

      .target-field label {
        display: none;
      }

      #proteinTargetInput::placeholder,
      #fiberTargetInput::placeholder {
        color: var(--muted);
      }

      .toolbar-actions {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        width: 100%;
      }

      .toolbar-actions .small-button {
        width: 100%;
      }

      .mobile-controls-toggle {
        display: inline-flex;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin-top: 4px;
      }

      .metric {
        min-height: 0;
        padding: 8px;
        border-radius: 12px;
      }

      .metric-label {
        margin-bottom: 4px;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .metric-value {
        font-size: 0.98rem;
      }

      .metric-subtle {
        display: none;
      }

      .meals {
        gap: 12px;
      }

      .meal-section {
        padding: 12px;
        border-radius: 16px;
      }

      .meal-header {
        margin-bottom: 10px;
      }

      .meal-header h2 {
        font-size: 1.35rem;
      }

      .meal-header p {
        font-size: 0.84rem;
      }

      .options,
      .options.single-option {
        grid-template-columns: 1fr;
      }

      .option-body {
        padding: 10px;
        gap: 6px;
      }

      .option-image,
      .option-placeholder {
        aspect-ratio: 16 / 10;
      }

      .option-name {
        font-size: 0.96rem;
      }

      .option-top {
        gap: 8px;
      }

      .pill {
        padding: 4px 8px;
        font-size: 0.76rem;
      }

      .selection-status {
        padding: 3px 7px;
        font-size: 0.74rem;
      }

      .option-note {
        font-size: 0.76rem;
      }

      .footer-note {
        margin-top: 14px;
      }
    }

    @media (max-width: 520px) {
      .target-controls,
      .toolbar-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div id="heroSpacer"></div>
      <div class="hero-card sticky-main-bar" id="heroCard">
        <div class="toolbar">
          <div class="toolbar-main">
            <div class="toolbar-left">
              <div class="top-links">
                <a class="jump-button" href="/?start={{ current_date }}" aria-label="Overview">
                  <span class="button-icon" aria-hidden="true">&#8962;</span>
                  <span class="button-text">Overview</span>
                </a>
              </div>
              <span class="toolbar-label">{{ diet_name }}</span>
              <div class="date-form">
                <div class="date-nav">
                  <button class="nav-button nav-arrow" id="prevDateButton" type="button" aria-label="Previous day">&#8592;</button>
                  <input class="date-input" id="dateInput" type="date" name="date" value="{{ current_date }}">
                  <button class="nav-button nav-arrow" id="nextDateButton" type="button" aria-label="Next day">&#8594;</button>
                </div>
                <button class="jump-button" id="goDateButton" type="button" aria-label="Open selected day">
                  <span class="button-icon" aria-hidden="true">&#10148;</span>
                  <span class="button-text">Go</span>
                </button>
              </div>
            </div>
            <div class="toolbar-state">
              <span class="save-status" id="saveStatus"></span>
              <span class="save-status" id="planCountLabel"></span>
              <button class="small-button mobile-controls-toggle" type="button" id="mobileControlsToggle" aria-expanded="false" aria-controls="mobileControlsPanel" aria-label="Open controls">
                <span class="button-icon" aria-hidden="true">&#9881;</span>
                <span class="button-text">Targets &amp; actions</span>
              </button>
            </div>
          </div>
        </div>
        <div class="error-box" id="errorBox" {% if not error_message %}hidden{% endif %}>
          {% if error_message %}
          {{ error_message }}
          {% endif %}
        </div>
        <div class="summary-grid" id="summaryGrid"></div>
        <div class="toolbar-secondary" id="mobileControlsPanel">
          <div class="target-controls">
            <div class="target-field">
              <label for="proteinTargetInput">Protein target</label>
              <input class="date-input target-input" id="proteinTargetInput" type="number" min="0.1" step="0.1" name="protein_target" value="{{ current_protein_target }}" placeholder="P" aria-label="Protein target">
            </div>
            <div class="target-field">
              <label for="fiberTargetInput">Fiber target</label>
              <input class="date-input target-input" id="fiberTargetInput" type="number" min="0.1" step="0.1" name="fiber_target" value="{{ current_fiber_target }}" placeholder="F" aria-label="Fiber target">
            </div>
          </div>
          <div class="toolbar-actions">
            <button class="small-button" type="button" id="editButton" aria-label="Edit selections">
              <span class="button-icon" aria-hidden="true">&#9998;</span>
              <span class="button-text">Edit</span>
            </button>
            <button class="small-button" type="button" id="saveButton" aria-label="Save selections">
              <span class="button-icon" aria-hidden="true">&#10003;</span>
              <span class="button-text">Save</span>
            </button>
            <button class="small-button" type="button" id="clearSelectionsButton" aria-label="Clear selections">
              <span class="button-icon" aria-hidden="true">&#10005;</span>
              <span class="button-text">Unselect all</span>
            </button>
          </div>
        </div>
      </div>
    </section>
    <section class="meals" id="mealsRoot"></section>
    <p class="footer-note">
      Each meal shows a few best options given the meals you selected so far. Picking one meal recomputes the recommendations for the remaining meals.
    </p>
  </div>
  <div class="loading-overlay" id="loadingOverlay" hidden aria-live="polite" aria-busy="true">
    <div class="loading-panel">
      <div class="loading-title">Loading</div>
      <div class="loading-text" id="loadingMessage">Opening page...</div>
      <div class="loading-progress" aria-hidden="true">
        <div class="loading-progress-bar"></div>
      </div>
    </div>
  </div>

  <script>
    let data = {{ page_data_json | safe }};
    const currentDateDefault = "{{ current_date }}";
    const mealsRoot = document.getElementById("mealsRoot");
    const summaryGrid = document.getElementById("summaryGrid");
    const planCountLabel = document.getElementById("planCountLabel");
    const errorBox = document.getElementById("errorBox");
    const heroCard = document.getElementById("heroCard");
    const heroSpacer = document.getElementById("heroSpacer");
    const dateInput = document.getElementById("dateInput");
    const prevDateButton = document.getElementById("prevDateButton");
    const nextDateButton = document.getElementById("nextDateButton");
    const goDateButton = document.getElementById("goDateButton");
    const proteinTargetInput = document.getElementById("proteinTargetInput");
    const fiberTargetInput = document.getElementById("fiberTargetInput");
    const editButton = document.getElementById("editButton");
    const saveButton = document.getElementById("saveButton");
    const clearSelectionsButton = document.getElementById("clearSelectionsButton");
    const saveStatus = document.getElementById("saveStatus");
    const mobileControlsPanel = document.getElementById("mobileControlsPanel");
    const mobileControlsToggle = document.getElementById("mobileControlsToggle");
    const mobileControlsToggleText = mobileControlsToggle.querySelector(".button-text");
    const mobileMediaQuery = window.matchMedia("(max-width: 720px)");
    const loadingOverlay = document.getElementById("loadingOverlay");
    const loadingMessage = document.getElementById("loadingMessage");
    let mobileControlsOpen = false;

    function showLoadingOverlay(message) {
      loadingMessage.textContent = message;
      loadingOverlay.hidden = false;
      document.body.classList.add("is-loading");
      requestAnimationFrame(() => {
        loadingOverlay.classList.add("is-visible");
      });
    }

    function hideLoadingOverlay() {
      loadingOverlay.classList.remove("is-visible");
      document.body.classList.remove("is-loading");
      window.setTimeout(() => {
        if (!loadingOverlay.classList.contains("is-visible")) {
          loadingOverlay.hidden = true;
        }
      }, 160);
    }

    function formatNumber(value) {
      return Number(value).toFixed(1).replace(/\.0$/, "");
    }

    function formatLocalDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function syncHeroSpacer() {
      if (mobileMediaQuery.matches) {
        heroSpacer.style.height = "0px";
        return;
      }
      heroSpacer.style.height = `${heroCard.getBoundingClientRect().height + 12}px`;
    }

    function syncControlsPanel() {
      const shouldOpen = !mobileMediaQuery.matches || mobileControlsOpen;
      mobileControlsPanel.classList.toggle("is-collapsed", !shouldOpen);
      mobileControlsToggle.setAttribute("aria-expanded", shouldOpen ? "true" : "false");
      mobileControlsToggle.setAttribute("aria-label", shouldOpen ? "Hide controls" : "Open controls");
      mobileControlsToggle.title = shouldOpen ? "Hide controls" : "Open controls";
      mobileControlsToggleText.textContent = shouldOpen && mobileMediaQuery.matches
        ? "Hide controls"
        : "Targets & actions";
    }

    function updateDateLinks() {
      const current = new Date(`${dateInput.value}T00:00:00`);
      if (Number.isNaN(current.getTime())) {
        return;
      }
      const prev = new Date(current);
      prev.setDate(prev.getDate() - 1);
      const next = new Date(current);
      next.setDate(next.getDate() + 1);
      prevDateButton.dataset.targetDate = formatLocalDate(prev);
      nextDateButton.dataset.targetDate = formatLocalDate(next);
    }

      function buildNavigationUrl(dateValue) {
        const params = new URLSearchParams({
          date: dateValue,
          protein_target: proteinTargetInput.value,
          fiber_target: fiberTargetInput.value,
        });
        return `/day?${params.toString()}`;
      }

    function setError(message) {
      if (!message) {
        errorBox.hidden = true;
        errorBox.textContent = "";
        return;
      }
      errorBox.hidden = false;
      errorBox.textContent = message;
    }

    if (!data) {
      planCountLabel.textContent = "";
      summaryGrid.innerHTML = "";
      syncControlsPanel();
      updateDateLinks();
      syncHeroSpacer();
    } else {
      const MAX_OPTIONS_PER_MEAL = 4;
      let lockedSelections = new Array(data.meals.length).fill(null);
      let currentPlan = null;
      let savedSelections = data.savedSelections.slice();
      let isEditing = false;
      let allowImmediateNavigation = false;
      let isSaving = false;

      function planKey(plan) {
        return (plan || []).join("-");
      }

      function hasUnsavedChanges() {
        return isEditing && currentPlan !== null && planKey(currentPlan) !== planKey(savedSelections);
      }

      function updateSaveUI() {
        const dirty = hasUnsavedChanges();
        if (mobileMediaQuery.matches && (isEditing || isSaving)) {
          mobileControlsOpen = true;
        }
        saveStatus.classList.remove("is-saved", "is-dirty", "is-saving");
        editButton.disabled = isSaving || isEditing;
        saveButton.disabled = isSaving || !isEditing || currentPlan === null || !dirty;
        saveButton.style.opacity = saveButton.disabled ? "0.6" : "1";
        prevDateButton.disabled = isSaving;
        nextDateButton.disabled = isSaving;
        goDateButton.disabled = isSaving;
        clearSelectionsButton.disabled = isSaving || !isEditing;
        mobileControlsToggle.disabled = isSaving;
        dateInput.disabled = isSaving;
        proteinTargetInput.disabled = isSaving;
        fiberTargetInput.disabled = isSaving;
        if (isSaving) {
          saveStatus.classList.add("is-saving");
          saveStatus.textContent = mobileMediaQuery.matches ? "Saving" : "Saving...";
          saveStatus.title = "Saving";
          saveStatus.setAttribute("aria-label", "Saving");
          return;
        }
        if (!isEditing) {
          saveStatus.classList.add("is-saved");
          saveStatus.textContent = mobileMediaQuery.matches ? "Saved" : "Showing saved meals";
          saveStatus.title = "Saved";
          saveStatus.setAttribute("aria-label", "Saved");
          return;
        }
        saveStatus.classList.add(dirty ? "is-dirty" : "is-saved");
        saveStatus.textContent = dirty
          ? (mobileMediaQuery.matches ? "Unsaved" : "Unsaved changes")
          : "Editing";
        saveStatus.title = dirty ? "Unsaved changes" : "Editing";
        saveStatus.setAttribute("aria-label", dirty ? "Unsaved changes" : "Editing");
      }

      async function recomputeChooser() {
        if (isSaving) {
          return;
        }
        const dateValue = dateInput.value || currentDateDefault;
        const proteinValue = proteinTargetInput.value;
        const fiberValue = fiberTargetInput.value;
        const query = new URLSearchParams({
          date: dateValue,
          protein_target: proteinValue,
          fiber_target: fiberValue,
        });
        showLoadingOverlay("Refreshing meals...");
        try {
          const response = await fetch(`/api/chooser?${query.toString()}`);
          if (!response.ok) {
            const text = await response.text();
            throw new Error(text || "Failed to recompute chooser.");
          }
          data = await response.json();
          lockedSelections = new Array(data.meals.length).fill(null);
          savedSelections = data.savedSelections.slice();
          isEditing = false;
          mobileControlsOpen = false;
          history.replaceState(null, "", `/day?${query.toString()}`);
          updateDateLinks();
          setError("");
          render();
        } catch (error) {
          setError(error.message || "Failed to recompute chooser.");
        } finally {
          hideLoadingOverlay();
        }
      }

      function planTotals(planChoices) {
        return planChoices.reduce((totals, optionIndex, mealIndex) => {
          const option = data.meals[mealIndex].options[optionIndex];
          totals.calories += Number(option.calorific || 0);
          totals.protein += Number(option.protein || 0);
          totals.fiber += Number(option.fiber || 0);
          return totals;
        }, { calories: 0, protein: 0, fiber: 0 });
      }

      function compatiblePlans(excludingMealIndex = null) {
        return data.feasiblePlans.filter((plan) => lockedSelections.every((choice, idx) => {
          if (choice === null) {
            return true;
          }
          if (excludingMealIndex !== null && idx === excludingMealIndex) {
            return true;
          }
          return plan[idx] === choice;
        }));
      }

      function rankedOptionsForMeal(mealIndex) {
        const plans = compatiblePlans(mealIndex);
        const optionMap = new Map();
        for (const plan of plans) {
          const optionIndex = plan[mealIndex];
          const entry = optionMap.get(optionIndex);
          if (!entry) {
            optionMap.set(optionIndex, {
              optionIndex,
              bestPlan: plan,
              supportCount: 1,
            });
          } else {
            entry.supportCount += 1;
          }
        }
        const ranked = [...optionMap.values()].sort((left, right) => {
          if (left.supportCount !== right.supportCount) {
            return right.supportCount - left.supportCount;
          }
          const leftTotals = planTotals(left.bestPlan);
          const rightTotals = planTotals(right.bestPlan);
          if (leftTotals.calories !== rightTotals.calories) {
            return leftTotals.calories - rightTotals.calories;
          }
          if (leftTotals.protein !== rightTotals.protein) {
            return rightTotals.protein - leftTotals.protein;
          }
          if (leftTotals.fiber !== rightTotals.fiber) {
            return rightTotals.fiber - leftTotals.fiber;
          }
          return left.optionIndex - right.optionIndex;
        });
        return ranked;
      }

      function bestPlanForCurrentLocks() {
        const plans = compatiblePlans();
        return plans.length ? plans[0] : null;
      }

      function renderSummary() {
        currentPlan = isEditing ? bestPlanForCurrentLocks() : savedSelections.slice();
        if (isEditing && !currentPlan) {
          setError("Current locked choices do not have any valid full-day completion.");
          return;
        }
        dateInput.value = data.date;
        proteinTargetInput.value = formatNumber(data.requestedTargets.protein);
        fiberTargetInput.value = formatNumber(data.requestedTargets.fiber);
        const totals = planTotals(currentPlan);
        const selectedCount = lockedSelections.filter((value) => value !== null).length;
        const targetsMet =
          totals.protein + 1e-9 >= data.effectiveTargets.protein
          && totals.fiber + 1e-9 >= data.effectiveTargets.fiber;
        const metrics = [
          {
            label: "Calories",
            value: mobileMediaQuery.matches
              ? `${formatNumber(totals.calories)}`
              : `${formatNumber(totals.calories)} kcal`,
            subtle: isEditing ? "Best full day" : "Saved day",
          },
          {
            label: mobileMediaQuery.matches ? "P" : "Protein",
            value: mobileMediaQuery.matches
              ? `${formatNumber(totals.protein)}/${formatNumber(data.effectiveTargets.protein)}`
              : `${formatNumber(totals.protein)} g`,
            subtle: `Goal ${formatNumber(data.effectiveTargets.protein)} g`,
          },
          {
            label: mobileMediaQuery.matches ? "F" : "Fiber",
            value: mobileMediaQuery.matches
              ? `${formatNumber(totals.fiber)}/${formatNumber(data.effectiveTargets.fiber)}`
              : `${formatNumber(totals.fiber)} g`,
            subtle: `Goal ${formatNumber(data.effectiveTargets.fiber)} g`,
          },
          {
            label: mobileMediaQuery.matches ? "Status" : "Target status",
            value: targetsMet ? "OK" : "Low",
            subtle: isEditing
              ? `${selectedCount} meal${selectedCount === 1 ? "" : "s"} locked`
              : "Saved on server",
          },
        ];

        summaryGrid.innerHTML = metrics.map((metric) => `
          <div class="metric">
            <div class="metric-label">${metric.label}</div>
            <div class="metric-value">${metric.value}</div>
            <div class="metric-subtle">${metric.subtle}</div>
          </div>
        `).join("");

        planCountLabel.textContent = isEditing
          ? (mobileMediaQuery.matches
            ? `${data.feasiblePlans.length} plan${data.feasiblePlans.length === 1 ? "" : "s"}`
            : `${data.date} · ${data.feasiblePlans.length} valid plan${data.feasiblePlans.length === 1 ? "" : "s"}`)
          : (mobileMediaQuery.matches ? data.date : `${data.date} · saved plan`);
        updateDateLinks();
        updateSaveUI();
        syncControlsPanel();
        syncHeroSpacer();
      }

      function buildMeals() {
        mealsRoot.innerHTML = "";
        data.meals.forEach((meal, mealIndex) => {
          const section = document.createElement("section");
          section.className = "meal-section";
          if (!isEditing) {
            const savedOptionIndex = savedSelections[mealIndex];
            const option = meal.options[savedOptionIndex];
            const imageMarkup = option.imageUrl
              ? `<img class="option-image" src="${option.imageUrl}" alt="${option.name}">`
              : `<div class="option-placeholder">No photo</div>`;
            section.innerHTML = `
              <div class="meal-header">
                <div>
                  <h2>${meal.label}</h2>
                  <p>${mobileMediaQuery.matches ? "Saved" : "Currently saved on the server"}</p>
                </div>
              </div>
              <div class="options single-option">
                <article class="option-card selected user-selected">
                  ${imageMarkup}
                  <div class="option-body">
                    <div class="option-top">
                      <div class="option-name">${option.name}</div>
                      <div class="selection-status saved">Saved</div>
                    </div>
                    <div class="macro-row">
                      <span class="pill">${formatNumber(option.calorific)} kcal</span>
                      <span class="pill">P ${formatNumber(option.protein)} g</span>
                      <span class="pill">F ${formatNumber(option.fiber)} g</span>
                    </div>
                    <div class="option-note">${mobileMediaQuery.matches ? "Current saved meal" : "Saved on server"}</div>
                  </div>
                </article>
              </div>
            `;
            mealsRoot.appendChild(section);
            return;
          }
          const rankedOptions = rankedOptionsForMeal(mealIndex);
          const selectedOptionIndex = currentPlan[mealIndex];
          const displayEntries = rankedOptions.slice(0, MAX_OPTIONS_PER_MEAL);
          const userSelectedOptionIndex = lockedSelections[mealIndex];
          if (
            userSelectedOptionIndex !== null
            && !displayEntries.some((entry) => entry.optionIndex === userSelectedOptionIndex)
          ) {
            const selectedEntry = rankedOptions.find((entry) => entry.optionIndex === userSelectedOptionIndex);
            if (selectedEntry) {
              displayEntries.push(selectedEntry);
            }
          }

          section.innerHTML = `
            <div class="meal-header">
              <div>
                <h2>${meal.label}</h2>
                <p>${mobileMediaQuery.matches
                  ? `${rankedOptions.length} option${rankedOptions.length === 1 ? "" : "s"}`
                  : `${rankedOptions.length} viable option${rankedOptions.length === 1 ? "" : "s"} given the current selected meals`}</p>
              </div>
            </div>
            <div class="options"></div>
          `;

          const optionsRoot = section.querySelector(".options");
          if (displayEntries.length === 1) {
            optionsRoot.classList.add("single-option");
          }
          displayEntries.forEach((entry) => {
            const optionIndex = entry.optionIndex;
            const option = meal.options[optionIndex];
            const card = document.createElement("article");
            card.className = "option-card";
            const projectedTotals = planTotals(entry.bestPlan);
            const isUserSelected = userSelectedOptionIndex === optionIndex;
            const isRecommended = selectedOptionIndex === optionIndex;
            const statusText = isUserSelected ? "Yours" : isRecommended ? "Best" : "Pick";
            const statusClass = isUserSelected ? "user" : isRecommended ? "recommended" : "pick";
            if (isRecommended) {
              card.classList.add("selected");
            }
            if (isUserSelected) {
              card.classList.add("user-selected");
            }
            const imageMarkup = option.imageUrl
              ? `<img class="option-image" src="${option.imageUrl}" alt="${option.name}">`
              : `<div class="option-placeholder">No photo</div>`;

            card.innerHTML = `
              ${imageMarkup}
              <div class="option-body">
                <div class="option-top">
                  <div class="option-name">${option.name}</div>
                  <div class="selection-status ${statusClass}">${statusText}</div>
                </div>
                <div class="macro-row">
                  <span class="pill">${formatNumber(option.calorific)} kcal</span>
                  <span class="pill">P ${formatNumber(option.protein)} g</span>
                  <span class="pill">F ${formatNumber(option.fiber)} g</span>
                </div>
                <div class="option-note">
                  ${mobileMediaQuery.matches
                    ? `Day ${formatNumber(projectedTotals.calories)} kcal · P ${formatNumber(projectedTotals.protein)} · F ${formatNumber(projectedTotals.fiber)}`
                    : `Best day: ${formatNumber(projectedTotals.calories)} kcal · P ${formatNumber(projectedTotals.protein)} g · F ${formatNumber(projectedTotals.fiber)} g`}
                  ${entry.supportCount > 1 ? `${mobileMediaQuery.matches ? " · " : "<br>"}${entry.supportCount} matching plan${entry.supportCount === 1 ? "" : "s"}` : ""}
                </div>
              </div>
            `;

            card.addEventListener("click", () => {
              if (isSaving) {
                return;
              }
              lockedSelections[mealIndex] = isUserSelected ? null : optionIndex;
              setError("");
              render();
            });
            optionsRoot.appendChild(card);
          });

          mealsRoot.appendChild(section);
        });
      }

      function render() {
        const bestPlan = isEditing ? bestPlanForCurrentLocks() : savedSelections.slice();
        if (isEditing && !bestPlan) {
          setError("Current locked choices do not have any valid full-day completion.");
          syncHeroSpacer();
          return;
        }
        setError("");
        currentPlan = bestPlan;
        renderSummary();
        buildMeals();
      }

      async function saveCurrentPlan() {
        if (!currentPlan || isSaving) {
          return;
        }
        isSaving = true;
        updateSaveUI();
        try {
          const response = await fetch("/api/save", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              date: data.date,
              protein_target: data.requestedTargets.protein,
              fiber_target: data.requestedTargets.fiber,
              selections: currentPlan,
            }),
          });
          const responsePayload = await response.json();
          if (!response.ok) {
            throw new Error(responsePayload.error || "Failed to save selection.");
          }
          data = responsePayload.chooser;
          savedSelections = data.savedSelections.slice();
          lockedSelections = new Array(data.meals.length).fill(null);
          isEditing = false;
          isSaving = false;
          mobileControlsOpen = false;
          setError("");
          render();
        } catch (error) {
          isSaving = false;
          setError(error.message || "Failed to save selection.");
          updateSaveUI();
        }
      }

      window.addEventListener("beforeunload", (event) => {
        if (!hasUnsavedChanges() || allowImmediateNavigation || isSaving) {
          return;
        }
        event.preventDefault();
        event.returnValue = "";
      });

      function confirmLeaveIfNeeded() {
        if (isSaving) {
          return false;
        }
        if (!hasUnsavedChanges()) {
          allowImmediateNavigation = true;
          return true;
        }
        const confirmed = window.confirm("You have unsaved changes. Leave without saving?");
        if (confirmed) {
          allowImmediateNavigation = true;
        }
        return confirmed;
      }

      function navigateToDate(dateValue) {
        if (!dateValue) {
          return;
        }
        if (!confirmLeaveIfNeeded()) {
          return;
        }
        showLoadingOverlay("Opening day...");
        window.location.assign(buildNavigationUrl(dateValue));
      }

      prevDateButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        navigateToDate(prevDateButton.dataset.targetDate);
      });
      nextDateButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        navigateToDate(nextDateButton.dataset.targetDate);
      });
      goDateButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        navigateToDate(dateInput.value);
      });
      dateInput.addEventListener("change", () => {
        if (mobileMediaQuery.matches) {
          navigateToDate(dateInput.value);
        }
      });

      proteinTargetInput.addEventListener("change", recomputeChooser);
      fiberTargetInput.addEventListener("change", recomputeChooser);
      proteinTargetInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          recomputeChooser();
        }
      });
      fiberTargetInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          recomputeChooser();
        }
      });
      editButton.addEventListener("click", () => {
        if (isSaving || isEditing) {
          return;
        }
        isEditing = true;
        mobileControlsOpen = true;
        lockedSelections = new Array(data.meals.length).fill(null);
        setError("");
        render();
      });
      saveButton.addEventListener("click", saveCurrentPlan);
      clearSelectionsButton.addEventListener("click", () => {
        if (isSaving) {
          return;
        }
        lockedSelections = new Array(data.meals.length).fill(null);
        setError("");
        render();
      });
      mobileControlsToggle.addEventListener("click", () => {
        mobileControlsOpen = !mobileControlsOpen;
        syncControlsPanel();
        syncHeroSpacer();
      });
      mobileMediaQuery.addEventListener("change", () => {
        if (!mobileMediaQuery.matches) {
          mobileControlsOpen = false;
        }
        syncControlsPanel();
        syncHeroSpacer();
      });
      window.addEventListener("resize", syncHeroSpacer);
      window.addEventListener("pageshow", hideLoadingOverlay);

      document.addEventListener("click", (event) => {
        const link = event.target.closest("a[href]");
        if (!link || link.target === "_blank" || link.hasAttribute("download")) {
          return;
        }
        const url = new URL(link.href, window.location.href);
        if (url.origin !== window.location.origin || url.href === window.location.href) {
          return;
        }
        if (!confirmLeaveIfNeeded()) {
          event.preventDefault();
          return;
        }
        event.preventDefault();
        showLoadingOverlay("Opening page...");
        window.location.assign(url.href);
      });

      render();
    }
  </script>
</body>
</html>
